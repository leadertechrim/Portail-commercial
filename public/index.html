<!DOCTYPE html>
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Viewport pour responsive design -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes"
    />

    <!-- Meta tags PWA -->
    <meta name="theme-color" content="#f67800" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="APLOFR" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Description et SEO -->
    <meta
      name="description"
      content="Portail centralisé pour consulter et gérer les appels d'offres. Interface moderne et responsive."
    />
    <meta
      name="keywords"
      content="appels d'offres, marchés publics, entreprises, contrats"
    />
    <meta name="author" content="APLOFR Team" />

    <!-- Open Graph pour partage social -->
    <meta property="og:title" content="APLOFR - Portail des Appels d'Offres" />
    <meta
      property="og:description"
      content="Plateforme centralisée pour consulter et gérer les appels d'offres"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="APLOFR - Portail des Appels d'Offres" />
    <meta
      name="twitter:description"
      content="Plateforme centralisée pour consulter et gérer les appels d'offres"
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- Icons pour différents appareils -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%PUBLIC_URL%/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="%PUBLIC_URL%/favicon.ico"
    />

    <!-- Manifest PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preload des ressources critiques -->
    <link
      rel="preconnect"
      href="https://applesoffres-production.up.railway.app"
    />

    <title>APLOFR - Portail des Appels d'Offres</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <noscript>
      <div
        style="
          text-align: center;
          padding: 50px;
          font-family: Arial, sans-serif;
        "
      >
        <h2>JavaScript requis</h2>
        <p>Vous devez activer JavaScript pour utiliser cette application.</p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
