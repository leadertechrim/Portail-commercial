<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Utilisateurs - Admin</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .admin-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .admin-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 30px;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      .stat-number {
        font-size: 2em;
        font-weight: bold;
        color: #667eea;
      }
      .users-table {
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .table-header {
        background: #f8f9fa;
        padding: 15px 20px;
        border-bottom: 1px solid #dee2e6;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 12px 20px;
        text-align: left;
        border-bottom: 1px solid #dee2e6;
      }
      th {
        background: #f8f9fa;
        font-weight: 600;
      }
      .role-badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.8em;
        font-weight: 500;
      }
      .role-admin {
        background: #dc3545;
        color: white;
      }
      .role-user {
        background: #28a745;
        color: white;
      }
      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9em;
        margin: 2px;
      }
      .btn-edit {
        background: #007bff;
        color: white;
      }
      .btn-delete {
        background: #dc3545;
        color: white;
      }
      .btn:hover {
        opacity: 0.8;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
      }
      .modal-content {
        background-color: white;
        margin: 5% auto;
        padding: 20px;
        border-radius: 10px;
        width: 80%;
        max-width: 500px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      .error {
        color: #dc3545;
        font-size: 0.9em;
        margin-top: 5px;
      }
      .success {
        color: #28a745;
        font-size: 0.9em;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <div class="admin-header">
        <h1><i class="fas fa-users-cog"></i> Gestion des Utilisateurs</h1>
        <p>Interface d'administration pour gérer les utilisateurs du système</p>
      </div>

      <!-- Statistiques -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-number" id="totalUsers">-</div>
          <div>Total Utilisateurs</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="adminUsers">-</div>
          <div>Administrateurs</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="regularUsers">-</div>
          <div>Utilisateurs</div>
        </div>
      </div>

      <!-- Table des utilisateurs -->
      <div class="users-table">
        <div class="table-header">
          <h3><i class="fas fa-list"></i> Liste des Utilisateurs</h3>
        </div>
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Email</th>
              <th>Rôle</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr>
              <td colspan="4" style="text-align: center; padding: 20px">
                <i class="fas fa-spinner fa-spin"></i> Chargement...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal d'édition -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <h3><i class="fas fa-edit"></i> Modifier l'utilisateur</h3>
        <form id="editUserForm">
          <input type="hidden" id="editUserId" />
          <div class="form-group">
            <label for="editName">Nom:</label>
            <input type="text" id="editName" required />
          </div>
          <div class="form-group">
            <label for="editEmail">Email:</label>
            <input type="email" id="editEmail" required />
          </div>
          <div class="form-group">
            <label for="editRole">Rôle:</label>
            <select id="editRole" required>
              <option value="user">Utilisateur</option>
              <option value="admin">Administrateur</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editPassword"
              >Nouveau mot de passe (laisser vide pour ne pas changer):</label
            >
            <input type="password" id="editPassword" />
          </div>
          <div class="form-group">
            <button type="submit" class="btn btn-edit">Mettre à jour</button>
            <button type="button" class="btn" onclick="closeModal()">
              Annuler
            </button>
          </div>
          <div id="editMessage"></div>
        </form>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        // Vérifier l'authentification
        if (!auth.isLoggedIn()) {
            alert("Vous devez être connecté pour accéder à cette page");
            window.location.href = "/";
            return;
        }

        if (!auth.isAdmin()) {
            alert("Accès refusé. Seuls les administrateurs peuvent accéder à cette page");
            window.location.href = "/";
            return;
        }

      // Charger les statistiques
      async function loadStats() {
        try {
          const stats = await fetchUserStats();
          document.getElementById("totalUsers").textContent = stats.total_users;
          document.getElementById("adminUsers").textContent = stats.admin_users;
          document.getElementById("regularUsers").textContent = stats.regular_users;
        } catch (error) {
          console.error("Erreur lors du chargement des statistiques:", error);
          document.getElementById("totalUsers").textContent = "Erreur";
          document.getElementById("adminUsers").textContent = "Erreur";
          document.getElementById("regularUsers").textContent = "Erreur";
        }
      }

      // Charger la liste des utilisateurs
      async function loadUsers() {
        try {
          const users = await fetchUsers();
          displayUsers(users);
        } catch (error) {
          console.error("Erreur lors du chargement des utilisateurs:", error);
          document.getElementById("usersTableBody").innerHTML =
            '<tr><td colspan="4" style="text-align: center; color: #dc3545;">Erreur de chargement: ' + error.message + '</td></tr>';
        }
      }

      // Afficher les utilisateurs dans le tableau
      function displayUsers(users) {
        const tbody = document.getElementById("usersTableBody");
        if (users.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="4" style="text-align: center;">Aucun utilisateur trouvé</td></tr>';
          return;
        }

        tbody.innerHTML = users
          .map(
            (user) => `
                <tr>
                    <td>${user.name || "N/A"}</td>
                    <td>${user.email}</td>
                    <td><span class="role-badge role-${user.role}">${
              user.role
            }</span></td>
                    <td>
                        <button class="btn btn-edit" onclick="editUser('${
                          user._id
                        }', '${user.name || ""}', '${user.email}', '${
              user.role
            }')">
                            <i class="fas fa-edit"></i> Modifier
                        </button>
                        <button class="btn btn-delete" onclick="deleteUser('${
                          user._id
                        }', '${user.email}')">
                            <i class="fas fa-trash"></i> Supprimer
                        </button>
                    </td>
                </tr>
            `
          )
          .join("");
      }

      // Modifier un utilisateur
      function editUser(id, name, email, role) {
        document.getElementById("editUserId").value = id;
        document.getElementById("editName").value = name;
        document.getElementById("editEmail").value = email;
        document.getElementById("editRole").value = role;
        document.getElementById("editPassword").value = "";
        document.getElementById("editMessage").innerHTML = "";
        document.getElementById("editModal").style.display = "block";
      }

      // Fermer le modal
      function closeModal() {
        document.getElementById("editModal").style.display = "none";
      }

      // Soumettre la modification
      document
        .getElementById("editUserForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const userId = document.getElementById("editUserId").value;
          const name = document.getElementById("editName").value;
          const email = document.getElementById("editEmail").value;
          const role = document.getElementById("editRole").value;
          const password = document.getElementById("editPassword").value;

          const updateData = { name, email, role };
          if (password) {
            updateData.password = password;
          }

          try {
            const response = await fetch(`/api/users/${userId}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${authToken}`,
              },
              body: JSON.stringify(updateData),
            });

            const result = await response.json();

            if (response.ok) {
              document.getElementById("editMessage").innerHTML =
                '<div class="success">Utilisateur mis à jour avec succès</div>';
              setTimeout(() => {
                closeModal();
                loadUsers();
              }, 1500);
            } else {
              document.getElementById(
                "editMessage"
              ).innerHTML = `<div class="error">${result.message}</div>`;
            }
          } catch (error) {
            console.error("Erreur lors de la mise à jour:", error);
            document.getElementById("editMessage").innerHTML =
              '<div class="error">Erreur de connexion</div>';
          }
        });

      // Supprimer un utilisateur
      async function deleteUser(id, email) {
        if (
          !confirm(
            `Êtes-vous sûr de vouloir supprimer l'utilisateur ${email} ?`
          )
        ) {
          return;
        }

        try {
          const response = await fetch(`/api/users/${id}`, {
            method: "DELETE",
            headers: {
              Authorization: `Bearer ${authToken}`,
            },
          });

          const result = await response.json();

          if (response.ok) {
            alert("Utilisateur supprimé avec succès");
            loadUsers();
            loadStats();
          } else {
            alert(`Erreur: ${result.message}`);
          }
        } catch (error) {
          console.error("Erreur lors de la suppression:", error);
          alert("Erreur de connexion");
        }
      }

      // Fermer le modal en cliquant à l'extérieur
      window.onclick = function (event) {
        const modal = document.getElementById("editModal");
        if (event.target === modal) {
          closeModal();
        }
      };

      // Charger les données au chargement de la page
      document.addEventListener("DOMContentLoaded", function () {
        loadStats();
        loadUsers();
      });
    </script>
  </body>
</html>
